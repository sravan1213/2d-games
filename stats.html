  <body>
    <div class="bg-decor" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
      <span class="floaty floaty-1">⭐</span>
      <span class="floaty floaty-2">🎈</span>
